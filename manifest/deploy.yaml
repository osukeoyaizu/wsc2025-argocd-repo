apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: wsc2025
  name: nginx-deploy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-app
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-app
    spec:
      # serviceAccountName: nginx-serviceaccount #コンテナがAWSサービスにアクセスする際に必要
      containers:
      - image: nginx  #コンテナイメージを指定する
        # env:
        # - name: nginx
        #   value: nginx
        resources:
          limits:
            memory: "700Mi"  #Fargateはメモリ予約に 256 MB追加される
            cpu: "0.5"
          requests:
            memory: "700Mi"
            cpu: "0.5"
        imagePullPolicy: Always
        name: nginx-app
        ports:
        - containerPort: 80
